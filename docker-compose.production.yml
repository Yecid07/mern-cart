services:
  api:
    build: .
    container_name: cart_api_production
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo_production:27017/cart_production
    depends_on:
      mongo_production:
        condition: service_healthy
    restart: unless-stopped

  mongo_production:
    image: mongo:7
    container_name: cart_mongo_production
    ports:
      - "27019:27017"
    volumes:
      - mongo_production_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_production_data:
